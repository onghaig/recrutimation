<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recrutimation</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      width: 300px;
      background: #f8fafc;
      color: #1e293b;
    }
    header {
      background: #0284c7;
      color: white;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    header h1 { font-size: 15px; font-weight: 700; }
    .body { padding: 16px; }
    .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 12px;
      background: white;
      border-radius: 8px;
      margin-bottom: 12px;
      border: 1px solid #e2e8f0;
    }
    .stat-label { color: #64748b; }
    .stat-value { font-weight: 600; }
    label { display: block; font-weight: 500; margin-bottom: 4px; color: #475569; }
    input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
    }
    input:focus { border-color: #0284c7; }
    .input-row { margin-bottom: 12px; }
    button {
      width: 100%;
      padding: 8px;
      background: #0284c7;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #0369a1; }
    .status {
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      text-align: center;
    }
    .status.success { background: #dcfce7; color: #166534; }
    .status.error   { background: #fee2e2; color: #991b1b; }
    .link {
      display: block;
      margin-top: 12px;
      text-align: center;
      color: #0284c7;
      text-decoration: none;
      font-size: 12px;
    }
    .link:hover { text-decoration: underline; }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 4px;
    }
    .dot.green  { background: #22c55e; }
    .dot.red    { background: #ef4444; }
    .dot.grey   { background: #94a3b8; }
  </style>
</head>
<body>
  <header>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
      <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
      <circle cx="9" cy="7" r="4"/>
      <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
      <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
    </svg>
    <h1>Recrutimation</h1>
  </header>

  <div class="body">
    <!-- Sync stats -->
    <div class="stat-row">
      <span class="stat-label">Candidates synced</span>
      <span class="stat-value" id="stat-total">—</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Last sync</span>
      <span class="stat-value" id="stat-last">—</span>
    </div>
    <div class="stat-row" id="status-row">
      <span class="stat-label">API status</span>
      <span class="stat-value" id="stat-status">
        <span class="dot grey"></span>Checking…
      </span>
    </div>

    <!-- API URL setting -->
    <div class="input-row">
      <label for="api-url">API URL</label>
      <input id="api-url" type="url" placeholder="http://localhost:3000" />
    </div>
    <button id="save-btn">Save Settings</button>
    <div id="msg" class="status" style="display:none"></div>

    <a class="link" id="open-app" href="#" target="_blank">Open Dashboard →</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
